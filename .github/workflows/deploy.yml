name: CI / CD — Admin Panel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  deploy:
    name: Deploy to production
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: SSH & deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 15m
          envs: GIT_TOKEN,REPO
          env:
            GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
            REPO: ${{ github.repository }}
          script: |
            set -e

            APP_DIR=~/guai-enterprise/GU.AI-admin-panel

            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p ~/apps
              git clone "https://x-access-token:${GIT_TOKEN}@github.com/${REPO}.git" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --all
            git reset --hard origin/main

            npm ci
            npm run build

            cp -r public .next/standalone/
            cp -r .next/static .next/standalone/.next/

            pm2 restart guai-admin \
              || PORT=3001 pm2 start .next/standalone/server.js \
                              --name guai-admin \
                              --env-file .env.production
            pm2 save
