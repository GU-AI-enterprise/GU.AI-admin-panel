name: CI / CD — Admin Panel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  deploy:
    name: Deploy to production
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: SSH & deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          REPO: ${{ github.repository }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 15m
          envs: GIT_TOKEN,REPO
          script: |
            set -e

            cd ~/guai-enterprise/GU.AI-admin-panel
            git remote set-url origin "https://x-access-token:${GIT_TOKEN}@github.com/${REPO}.git"
            git fetch --all
            git reset --hard origin/main

            cd ~/guai-enterprise
            docker-compose build admin_panel
            docker-compose up -d admin_panel
